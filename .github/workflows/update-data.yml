name: Scrape API-Football Lineups

on:
  workflow_dispatch: # This makes it listen exclusively for your external ping!

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Scraper
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          python scraper.py
          python sitemap_generator.py
        
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ sitemap.xml
          
          # Check if there are staged changes ready to be committed
          if ! git diff --quiet --staged; then
            git commit -m "⚽ Automated API-Football update and sitemap generation [skip ci]"
            
            # Pull latest changes and rebase BEFORE pushing
            git pull --rebase origin main || echo "Nothing to pull"
            
            # Try pushing. If rejected, pull again and immediately push.
            git push origin main || (git pull --rebase origin main && git push origin main)
          else
            echo "No new soccer data or sitemap updates. Skipping commit."
          fi
