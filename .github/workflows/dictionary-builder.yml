name: Dictionary Builder

# The workflow_dispatch trigger creates a manual "Run" button in GitHub
on:
  workflow_dispatch:

jobs:
  build-dictionaries:
    runs-on: ubuntu-latest
    
    # Grants the bot permission to save the JSON files back to your repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Harvester Script
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        # Updated to point to the new scripts folder!
        run: |
          python scripts/harvester_players.py

      - name: Commit and Push Dictionary Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          
          # Check if there are staged changes ready to be committed
          if ! git diff --quiet --staged; then
            git commit -m "🤖 Data Harvest: Updated master dictionaries [skip ci]"
            
            # Pull latest changes and rebase BEFORE pushing
            git pull --rebase origin main || echo "Nothing to pull"
            
            # Try pushing. If rejected, pull again and immediately push.
            git push origin main || (git pull --rebase origin main && git push origin main)
          else
            echo "No new data to commit. Dictionary is up to date. Skipping commit."
          fi
