name: Dictionary Builder

# The workflow_dispatch trigger creates a manual "Run" button in GitHub
on:
  workflow_dispatch:

jobs:
  build-dictionaries:
    runs-on: ubuntu-latest
    
    # Grants the bot permission to save the JSON files back to your repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Harvester Script
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        # Updated to point to the new scripts folder!
        run: |
          python scripts/harvester_players.py

      - name: Commit and Push Dictionary Data
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          
          # Only commit if the script actually created/changed files
          if git diff-index --quiet HEAD --; then
            echo "No new data to commit. Dictionary is up to date."
          else
            git commit -m "🤖 Data Harvest: Updated master dictionaries"
            git push
          fi
