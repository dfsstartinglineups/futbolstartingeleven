<div class="modal fade" id="playerProfileModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content border-0 shadow-lg" style="border-radius: 16px; overflow: hidden;">
        
        <div class="modal-header text-white text-center position-relative d-flex justify-content-center align-items-center" style="background: linear-gradient(135deg, #198754 0%, #212529 100%); border-bottom: none; height: 110px;">
            <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Close" style="z-index: 10;"></button>
            
            <div style="width: 90px; height: 90px; border-radius: 50%; background-color: #f8f9fa; border: 4px solid #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.2); position: absolute; bottom: -45px; overflow: hidden; z-index: 5;">
                <img id="modal-player-photo" src="" alt="Player Photo" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                <div id="modal-player-initials" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 800; color: #adb5bd; display: none;">?</div>
            </div>
        </div>
        
        <div class="modal-body text-center pt-5 pb-4 px-4 bg-white">
            <h5 id="modal-player-name" class="fw-bold text-dark mb-0 mt-2" style="font-size: 1.15rem; letter-spacing: -0.5px;">Player Name</h5>
            <div id="modal-player-bio" class="text-muted mb-3" style="font-size: 0.8rem; font-weight: 500;">Position • Age • Nationality</div>
            
            <div class="row g-2 text-center" id="modal-player-stats-container">
                </div>
            
            <div id="modal-no-stats" class="text-muted fst-italic mt-3 d-none" style="font-size: 0.8rem;">
                No season statistics available for this player.
            </div>
        </div>
      </div>
    </div>
</div>
